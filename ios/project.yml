name: CodexBariOS
options:
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
packages:
  CodexBar:
    path: ..
targets:
  CodexBariOSApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CodexBariOSApp/Sources
      - path: CodexBariOSApp/Resources/Assets.xcassets
        buildPhase: resources
      - path: CodexBariOSApp/Resources/LaunchScreen.storyboard
        buildPhase: resources
    info:
      path: CodexBariOSApp/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: CodexBariOSApp/CodexBariOSApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.steipete.codexbar
    dependencies:
      - package: CodexBar
        product: CodexBariOSShared
      - target: CodexBariOSWidgetExtension
        embed: true
        codeSign: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.steipete.codexbar.ios
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_STRICT_CONCURRENCY: complete
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
  CodexBariOSWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CodexBariOSWidget/Sources
    info:
      path: CodexBariOSWidget/Info.plist
      properties:
        CFBundleDisplayName: CodexBar
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: CodexBariOSWidget/CodexBariOSWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.steipete.codexbar
    dependencies:
      - package: CodexBar
        product: CodexBariOSShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.steipete.codexbar.ios.widget
        APPLICATION_EXTENSION_API_ONLY: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
    attributes:
      SystemCapabilities:
        com.apple.ApplicationGroups.iOS:
          enabled: 1
